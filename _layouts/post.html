---
layout: default
---
<article class="article">
  <header class="article-header">
    <p class="kicker">{{ page.date | date: "%d %B %Y" }}{% if page.category %} · {{ page.category }}{% endif %}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="lede">{{ page.subtitle }}</p>{% endif %}
  </header>
  {% if page.image %}
    <figure class="hero-image"><img src="{{ page.image | relative_url }}" alt="{{ page.image_alt | default: page.title }}"></figure>
  {% endif %}
  <div class="prose article-body">
    {{ content }}
  </div>
</article>
