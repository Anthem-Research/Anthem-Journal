<header class="site-header">
  <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
  <nav class="site-nav" aria-label="Primary navigation">
    {% for item in site.data.navigation %}
      <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
    {% endfor %}
  </nav>
</header>
